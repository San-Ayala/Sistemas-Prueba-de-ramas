<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iniciar Sesión | SST Challenge</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header>

    <div class="logo">
        <h1>SST Challenge</h1>
    </div>

</header>

<section class="login">

    <div class="login-box">

        <h2>Iniciar Sesión</h2>

        <p>Ingresa para comenzar la descarga del videojuego.</p>

        <form id="loginForm">

            <input
                type="email"
                id="loginCorreo"
                placeholder="Correo electrónico"
                required>

            <input
                type="password"
                id="loginPassword"
                placeholder="Contraseña"
                required>

            <button
                type="submit"
                class="btnPrincipal">

                Ingresar

            </button>

        </form>

        <p class="registro">

            ¿No tienes una cuenta?

            <a href="registro.html">

                Regístrate aquí

            </a>

        </p>

    </div>

</section>

<script src="js/script.js"></script>

</body>

</html>
